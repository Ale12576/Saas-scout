<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  
  <header class="site-header">
    <div class="container header-inner">
      <a href="{{ '/' | relative_url }}" class="logo">
        <div class="logo-mark">S</div>
        <span class="logo-text">SaaS Scout</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/archivio' | relative_url }}">Archivio</a>
        <a href="{{ '/metodologia' | relative_url }}">Metodologia</a>
        <a href="https://buttondown.email/saas-scout" target="_blank">Newsletter</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 SaaS Scout — Recensioni indipendenti di AI Tools</p>
      <p class="footer-note">Alcuni link sono affiliati. Questo non influenza le nostre recensioni.</p>
    </div>
  </footer>

</body>
</html>
